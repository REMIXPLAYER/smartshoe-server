spring.application.name=smartshoe-server

# Server Configuration
server.port=8080

# ==========================================
# MySQL 8.0 Database Configuration (Production)
# ==========================================
# 注意：部署时请修改为实际的服务器数据库地址
# 如果MySQL在本地：localhost
# 如果MySQL在其他服务器：修改IP地址
spring.datasource.url=jdbc:mysql://localhost:3306/smartshoe_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# JPA Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool (HikariCP) - Production optimized
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
# 控制台日志 - 生产环境使用INFO级别
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.com.sensors.smartshoeserver=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# 日志格式
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# 文件日志配置
logging.file.name=logs/smartshoe-server.log
logging.file.max-size=10MB
logging.file.max-history=30

# Disable open-in-view warning
spring.jpa.open-in-view=false

# ==========================================
# Cold Data Compression Configuration
# ==========================================
# 是否启用冷数据压缩
cold.data.compression.enabled=true

# 多少天前的数据被视为冷数据（默认7天）
cold.data.compression.days-threshold=7

# 每批处理的记录数
cold.data.compression.batch-size=10

# 每次运行最多处理记录数
cold.data.compression.max-records-per-run=100

# 最小压缩率，低于此值不压缩（0.8表示压缩后大小需小于原大小的80%）
cold.data.compression.min-compression-ratio=0.8
