# Test Configuration - Using MySQL 8.0
spring.application.name=smartshoe-server-test

# Server Configuration
server.port=0

# ==========================================
# MySQL 8.0 Database Configuration (Test)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/smartshoe_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# JPA Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging
logging.level.org.springframework.web=WARN
logging.level.com.sensors.smartshoeserver=INFO
logging.level.org.hibernate.SQL=WARN
