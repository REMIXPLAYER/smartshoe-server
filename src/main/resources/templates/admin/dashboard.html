<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - SmartShoe</title>
    <link rel="stylesheet" href="/css/admin.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1>SmartShoe 管理后台</h1>
            <p>欢迎回来，管理员</p>
        </header>

        <!-- Navigation -->
        <nav class="admin-nav">
            <a href="/admin" class="active">
                <svg class="icon"><use href="/icons/icons.svg#icon-home"/></svg> 首页
            </a>
            <a href="/admin/users">
                <svg class="icon"><use href="/icons/icons.svg#icon-users"/></svg> 用户管理
            </a>
            <a href="/admin/records">
                <svg class="icon"><use href="/icons/icons.svg#icon-folder"/></svg> 数据记录
            </a>
            <a href="/admin/charts">
                <svg class="icon"><use href="/icons/icons.svg#icon-chart"/></svg> 数据分析
            </a>
        </nav>

        <!-- Unified Statistics Card -->
        <div class="stats-unified">
            <div class="stats-unified-header">
                <svg class="icon icon-md"><use href="/icons/icons.svg#icon-chart"/></svg>
                <h2>系统概览</h2>
            </div>
            
            <div class="stats-grid-unified">
                <div class="stat-item-unified">
                    <div class="stat-icon-unified primary">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-users"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${totalUsers}">0</h3>
                        <p>总用户数</p>
                    </div>
                </div>

                <div class="stat-item-unified">
                    <div class="stat-icon-unified success">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-check"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${activeUsers}">0</h3>
                        <p>活跃用户</p>
                    </div>
                </div>

                <div class="stat-item-unified">
                    <div class="stat-icon-unified warning">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-warning"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${inactiveUsers}">0</h3>
                        <p>非活跃用户</p>
                    </div>
                </div>

                <div class="stat-item-unified">
                    <div class="stat-icon-unified info">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-database"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${totalRecords}">0</h3>
                        <p>数据记录</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="admin-grid admin-grid-2col">
            <!-- Recent Users -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2 class="admin-card-title">最近注册用户</h2>
                    <a href="/admin/users" class="btn btn-outline btn-sm">查看全部</a>
                </div>
                
                <div class="admin-table-container">
                    <table class="admin-table" th:if="${!#lists.isEmpty(recentUsers)}">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>状态</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${recentUsers}">
                                <td th:text="${user.username}">-</td>
                                <td th:text="${user.email}">-</td>
                                <td>
                                    <span th:if="${user.status == 'ACTIVE'}" class="badge badge-success">正常</span>
                                    <span th:if="${user.status != 'ACTIVE'}" class="badge badge-danger">禁用</span>
                                </td>
                                <td th:text="${user.createdAt}">-</td>
                                <td>
                                    <a th:href="@{/admin/users/{id}(id=${user.userId})}" class="btn btn-primary btn-sm">详情</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div th:if="${#lists.isEmpty(recentUsers)}" class="empty-state">
                    <svg class="icon icon-xl" style="opacity: 0.5;"><use href="/icons/icons.svg#icon-users"/></svg>
                    <p>暂无用户数据</p>
                </div>
            </div>

            <!-- User Status Chart -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2 class="admin-card-title">用户状态分布</h2>
                </div>
                <div class="chart-container" style="min-height: 280px;">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Activity Chart -->
        <div class="admin-card mt-md">
            <div class="admin-card-header">
                <h2 class="admin-card-title">数据上传趋势</h2>
                <select id="chartPeriod" class="admin-select" style="width: auto;">
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div class="chart-container">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Pass server-side data to JavaScript
        window.activeUsers = /*[[${activeUsers}]]*/ 0;
        window.inactiveUsers = /*[[${inactiveUsers}]]*/ 0;
    </script>
    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
