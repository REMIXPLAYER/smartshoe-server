<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析 - SmartShoe</title>
    <link rel="stylesheet" href="/css/admin.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>数据分析</h1>
            <p>系统数据统计与可视化分析</p>
        </header>

        <nav class="admin-nav">
            <a href="/admin">
                <svg class="icon"><use href="/icons/icons.svg#icon-home"/></svg> 首页
            </a>
            <a href="/admin/users">
                <svg class="icon"><use href="/icons/icons.svg#icon-users"/></svg> 用户管理
            </a>
            <a href="/admin/records">
                <svg class="icon"><use href="/icons/icons.svg#icon-folder"/></svg> 数据记录
            </a>
            <a href="/admin/charts" class="active">
                <svg class="icon"><use href="/icons/icons.svg#icon-chart"/></svg> 数据分析
            </a>
        </nav>

        <!-- Unified Statistics Card -->
        <div class="stats-unified">
            <div class="stats-unified-header">
                <svg class="icon icon-md"><use href="/icons/icons.svg#icon-chart"/></svg>
                <h2>数据概览</h2>
            </div>

            <div class="stats-grid-unified">
                <div class="stat-item-unified">
                    <div class="stat-icon-unified primary">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-database"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 id="totalRecordsStat">-</h3>
                        <p>总记录数</p>
                    </div>
                </div>

                <div class="stat-item-unified">
                    <div class="stat-icon-unified success">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-users"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 id="totalUsersStat">-</h3>
                        <p>总用户数</p>
                    </div>
                </div>

                <div class="stat-item-unified">
                    <div class="stat-icon-unified primary">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-chart"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 id="avgRecordsStat">-</h3>
                        <p>平均记录/用户</p>
                    </div>
                </div>

                <div class="stat-item-unified">
                    <div class="stat-icon-unified primary">
                        <svg class="icon icon-lg"><use href="/icons/icons.svg#icon-database"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 id="totalSizeStat">-</h3>
                        <p>总数据量</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Unified Charts Card -->
        <div class="admin-card charts-unified">
            <div class="admin-card-header">
                <h2 class="admin-card-title">数据分析图表</h2>
                <select id="timeRange" class="admin-select" style="width: auto;">
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div class="charts-grid">
                <div class="chart-item">
                    <h3 class="chart-title">数据上传趋势</h3>
                    <div class="chart-container-small">
                        <canvas id="uploadTrendChart"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <h3 class="chart-title">用户活跃度</h3>
                    <div class="chart-container-small">
                        <canvas id="userActivityChart"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <h3 class="chart-title">存储分布</h3>
                    <div class="chart-container-small">
                        <canvas id="storageChart"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <h3 class="chart-title">压缩效率</h3>
                    <div class="chart-container-small">
                        <canvas id="compressionChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- User Ranking & Hourly Distribution Section -->
            <div class="two-section-grid" style="margin-top: var(--spacing-lg); border-top: 1px solid var(--light-bg); padding-top: var(--spacing-lg);">
                <div class="section-item">
                    <h3 class="section-title">活跃用户排行 <span class="badge badge-primary">Top 10</span></h3>
                    <div class="admin-table-container">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>用户名</th>
                                    <th>记录数</th>
                                    <th>数据点数</th>
                                    <th>总大小</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="topUsersTable">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="section-item">
                    <h3 class="section-title">上传时间分布</h3>
                    <div class="chart-container">
                        <canvas id="hourlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/charts.js"></script>
</body>
</html>
