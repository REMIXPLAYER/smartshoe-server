<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录详情 - SmartShoe</title>
    <link rel="stylesheet" href="/css/admin.css?v=5">
    <style>
        .icon { display: inline-block; width: 1em; height: 1em; vertical-align: middle; fill: currentColor; }
        .icon-24 { width: 24px; height: 24px; }
        .icon-32 { width: 32px; height: 32px; }

        /* Card spacing to prevent overlap */
        .admin-card {
            margin-bottom: var(--spacing-lg);
        }

        /* Grid spacing fix */
        .admin-grid {
            gap: var(--spacing-lg);
        }

        .admin-grid-2col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }

        /* Info grid items - remove background */
        .info-item {
            background: transparent !important;
            border: 1px solid var(--light-bg);
        }

        /* Chart container */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* Interactive Sensor Legend */
        .sensor-legend {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
            flex-wrap: wrap;
        }

        .sensor-legend-btn {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--dark-text);
        }

        .sensor-legend-btn:hover {
            background: var(--light-bg);
        }

        .sensor-legend-btn.active {
            border-color: var(--primary);
            background: rgba(53, 88, 114, 0.05);
        }

        .sensor-legend-btn.hidden {
            opacity: 0.5;
            border-color: #ddd;
        }

        .sensor-legend-btn.hidden .sensor-dot {
            background: #ccc !important;
        }

        .sensor-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.2s ease;
        }

        @media (max-width: 768px) {
            .chart-container {
                height: 250px;
            }
        }

        @media (max-width: 576px) {
            .chart-container {
                height: 280px;
                min-height: 280px !important;
            }

            .admin-grid-2col {
                grid-template-columns: 1fr;
            }

            .sensor-legend {
                gap: var(--spacing-xs);
                flex-direction: column;
                align-items: stretch;
            }

            .sensor-legend-btn {
                padding: var(--spacing-xs) var(--spacing-sm);
                font-size: 0.75rem;
                justify-content: center;
                width: 100%;
            }

            /* Info grid mobile optimization */
            .info-grid {
                grid-template-columns: 1fr;
            }

            .info-item {
                padding: var(--spacing-sm);
            }

            .info-item label {
                font-size: 0.75rem;
            }

            .info-item span {
                font-size: 0.875rem;
                word-break: break-all;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <svg style="display: none;">
        <symbol id="icon-home" viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
        <symbol id="icon-users" viewBox="0 0 24 24"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></symbol>
        <symbol id="icon-folder" viewBox="0 0 24 24"><path fill="currentColor" d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></symbol>
        <symbol id="icon-chart" viewBox="0 0 24 24"><path fill="currentColor" d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></symbol>
        <symbol id="icon-database" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3C7.58 3 4 4.79 4 7v10c0 2.21 3.59 4 8 4s8-1.79 8-4V7c0-2.21-3.58-4-8-4zm0 2c3.87 0 6 1.5 6 2s-2.13 2-6 2-6-1.5-6-2 2.13-2 6-2zm6 12c0 .5-2.13 2-6 2s-6-1.5-6-2v-2.23c1.61.78 3.72 1.23 6 1.23s4.39-.45 6-1.23V17zm0-5c0 .5-2.13 2-6 2s-6-1.5-6-2V9.77c1.61.78 3.72 1.23 6 1.23s4.39-.45 6-1.23V12z"/></symbol>
        <symbol id="icon-check" viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
        <symbol id="icon-warning" viewBox="0 0 24 24"><path fill="currentColor" d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></symbol>
        <symbol id="icon-edit" viewBox="0 0 24 24"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></symbol>
        <symbol id="icon-delete" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></symbol>
        <symbol id="icon-back" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></symbol>
        <symbol id="icon-download" viewBox="0 0 24 24"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></symbol>
        <symbol id="icon-sensor" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></symbol>
        <symbol id="icon-time" viewBox="0 0 24 24"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></symbol>
        <symbol id="icon-csv" viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></symbol>
    </svg>

    <div class="admin-container">
        <header class="admin-header">
            <h1>记录详情</h1>
            <p>查看传感器数据记录和图表分析</p>
        </header>

        <nav class="admin-nav">
            <a href="/admin">
                <svg class="icon"><use href="#icon-home"/></svg> 首页
            </a>
            <a href="/admin/users">
                <svg class="icon"><use href="#icon-users"/></svg> 用户管理
            </a>
            <a href="/admin/records" class="active">
                <svg class="icon"><use href="#icon-folder"/></svg> 数据记录
            </a>
            <a href="/admin/charts">
                <svg class="icon"><use href="#icon-chart"/></svg> 数据分析
            </a>
        </nav>

        <a href="/admin/records" class="back-link">
            <svg class="icon"><use href="#icon-back"/></svg> 返回记录列表
        </a>

        <div class="admin-card">
            <div class="admin-card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <h2 class="admin-card-title">传感器数据图表</h2>
                
                <!-- 渲染点数选择控件 -->
                <div class="chart-controls" style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; color: #666;">渲染点数:</label>
                    <select id="pointCountSelect" onchange="onPointCountChange()" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; cursor: pointer;">
                        <option value="100" selected>100点</option>
                        <option value="200">200点</option>
                        <option value="500">500点</option>
                        <option value="0">全部数据</option>
                    </select>
                    <span id="dataInfo" style="font-size: 12px; color: #999;"></span>
                </div>
            </div>
            
            <div class="chart-container" style="min-height: 400px;">
                <canvas id="sensorChart"></canvas>
            </div>

            <!-- Interactive Legend -->
            <div class="sensor-legend">
                <button class="sensor-legend-btn active" data-index="0" onclick="toggleSensor(0)">
                    <span class="sensor-dot" style="background: #7AAACE;"></span>
                    <span>传感器1 (前掌)</span>
                </button>
                <button class="sensor-legend-btn active" data-index="1" onclick="toggleSensor(1)">
                    <span class="sensor-dot" style="background: #355872;"></span>
                    <span>传感器2 (足弓)</span>
                </button>
                <button class="sensor-legend-btn active" data-index="2" onclick="toggleSensor(2)">
                    <span class="sensor-dot" style="background: #9CD5FF;"></span>
                    <span>传感器3 (脚跟)</span>
                </button>
            </div>
        </div>

        <div class="admin-card">
            <div class="admin-card-header">
                <h2 class="admin-card-title">记录信息</h2>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>记录ID</label>
                    <span th:text="${record.recordId}">-</span>
                </div>
                <div class="info-item">
                    <label>所属用户</label>
                    <span th:if="${user != null}">
                        <a th:href="@{/admin/users/{id}(id=${user.userId})}" style="color: var(--primary); text-decoration: none;" th:text="${user.username}">-</a>
                    </span>
                    <span th:if="${user == null}" th:text="${record.userId}">-</span>
                </div>
                <div class="info-item">
                    <label>数据点数</label>
                    <span th:text="${record.dataCount}">-</span>
                </div>
                <div class="info-item">
                    <label>采样间隔</label>
                    <span th:text="${record.interval} + ' ms'">-</span>
                </div>
                <div class="info-item">
                    <label>传感器1 平均值</label>
                    <span id="sensor1Avg">-</span>
                </div>
                <div class="info-item">
                    <label>传感器2 平均值</label>
                    <span id="sensor2Avg">-</span>
                </div>
                <div class="info-item">
                    <label>传感器3 平均值</label>
                    <span id="sensor3Avg">-</span>
                </div>
                <div class="info-item">
                    <label>数据时长</label>
                    <span id="duration">-</span>
                </div>
                <div class="info-item">
                    <label>原始大小</label>
                    <span th:text="${record.originalSize} + ' B'">-</span>
                </div>
                <div class="info-item">
                    <label>压缩后大小</label>
                    <span th:text="${record.compressedSize != null ? record.compressedSize + ' B' : '未压缩'}">-</span>
                </div>
                <div class="info-item">
                    <label>压缩率</label>
                    <span class="badge badge-success" th:text="${record.compressionRatio}">-</span>
                </div>
                <div class="info-item">
                    <label>上传时间</label>
                    <span th:text="${record.createdAt}">-</span>
                </div>
            </div>
        </div>

        <div class="admin-grid admin-grid-2col">
            <div class="admin-card">
                <div class="admin-card-header">
                    <h2 class="admin-card-title">压力分布</h2>
                </div>
                <div class="chart-container" style="min-height: 250px;">
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>

            <div class="admin-card">
                <div class="admin-card-header">
                    <h2 class="admin-card-title">压力范围统计</h2>
                </div>
                <div class="chart-container" style="min-height: 250px;">
                    <canvas id="rangeChart"></canvas>
                </div>
            </div>
        </div>

        <div class="admin-card">
            <div class="admin-card-header">
                <h2 class="admin-card-title">操作</h2>
            </div>
            <div class="flex gap-md flex-wrap">
                <button class="btn btn-primary" onclick="exportData()">
                    <svg class="icon"><use href="#icon-download"/></svg> 导出数据 (JSON)
                </button>
                <button class="btn btn-outline" onclick="exportCSV()">
                    <svg class="icon"><use href="#icon-csv"/></svg> 导出CSV
                </button>
                <button class="btn btn-danger" th:attr="data-id=${record.recordId}" onclick="delRecord(this)">
                    <svg class="icon"><use href="#icon-delete"/></svg> 删除记录
                </button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        window.recordId = /*[[${record.recordId}]]*/ '';
    </script>
    <script src="/js/common.js"></script>
    <script src="/js/record-detail.js"></script>
</body>
</html>
