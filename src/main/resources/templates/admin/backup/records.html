<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据记录 - SmartShoe</title>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .icon { display: inline-block; width: 1em; height: 1em; vertical-align: middle; fill: currentColor; }
        .icon-24 { width: 24px; height: 24px; }
        .icon-32 { width: 32px; height: 32px; }

        /* Unified Stats Card - Match Dashboard Style */
        .stats-unified {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-lg);
        }

        .stats-unified-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--light-bg);
        }

        .stats-unified-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-nav);
        }

        .stats-grid-unified {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-md);
        }

        @media (max-width: 992px) {
            .stats-grid-unified {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .stats-grid-unified {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-item-unified {
                flex-direction: column;
                text-align: center;
                gap: var(--spacing-sm);
                padding: var(--spacing-sm);
            }

            .stat-icon-unified {
                width: 40px;
                height: 40px;
            }

            .stat-content-unified h3 {
                font-size: 1.25rem;
            }

            .stat-content-unified p {
                font-size: 0.75rem;
            }
        }

        .stat-item-unified {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            transition: var(--transition-normal);
        }

        .stat-item-unified:hover {
            background: var(--light-bg);
            transform: translateY(-2px);
        }

        .stat-icon-unified {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(53, 88, 114, 0.08);
            color: var(--primary);
        }

        .stat-content-unified h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--dark-text);
            margin-bottom: 2px;
        }

        .stat-content-unified p {
            font-size: 0.875rem;
            color: #666;
        }

        /* Card spacing to prevent overlap */
        .admin-card {
            margin-bottom: var(--spacing-lg);
        }

        /* Integrated Filter Styles */
        .filter-section {
            border-radius: var(--radius-md);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            border: 1px solid var(--light-bg);
        }

        /* Table header - remove background */
        .admin-table th {
            background: transparent !important;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-md);
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }
        
        .filter-item label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--dark-nav);
        }
        
        .filter-item input,
        .filter-item select {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid #ddd;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            transition: var(--transition-fast);
            background: white;
        }
        
        .filter-item input:focus,
        .filter-item select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(53, 88, 114, 0.1);
        }
        
        .range-inputs {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .range-inputs input {
            flex: 1;
            min-width: 60px;
        }
        
        .range-inputs span {
            color: #888;
            font-size: 0.75rem;
        }
        
        .filter-actions {
            display: flex;
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
            justify-content: flex-end;
        }
        
        /* Sortable Table Headers */
        .sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 20px !important;
        }
        
        .sortable:hover {
            background: rgba(53, 88, 114, 0.05);
        }
        
        .sortable::after {
            content: '↕';
            position: absolute;
            right: 8px;
            color: #aaa;
            font-size: 0.75rem;
        }
        
        .sortable.sort-asc::after {
            content: '↑';
            color: var(--primary);
        }
        
        .sortable.sort-desc::after {
            content: '↓';
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- SVG Icons Definition -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="icon-home" viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
        <symbol id="icon-users" viewBox="0 0 24 24"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></symbol>
        <symbol id="icon-folder" viewBox="0 0 24 24"><path fill="currentColor" d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></symbol>
        <symbol id="icon-chart" viewBox="0 0 24 24"><path fill="currentColor" d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></symbol>
        <symbol id="icon-database" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3C7.58 3 4 4.79 4 7v10c0 2.21 3.58 4 8 4s8-1.79 8-4V7c0-2.21-3.58-4-8-4z"/></symbol>
        <symbol id="icon-delete" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></symbol>
        <symbol id="icon-search" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
        <symbol id="icon-reset" viewBox="0 0 24 24"><path fill="currentColor" d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></symbol>
        <symbol id="icon-filter" viewBox="0 0 24 24"><path fill="currentColor" d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></symbol>
        <symbol id="icon-compress" viewBox="0 0 24 24"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5zM12 12l-3-3h2V4h2v5h2l-3 3z"/></symbol>
    </svg>

    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <h1>数据记录</h1>
            <p>查看和管理所有传感器数据记录</p>
        </header>

        <!-- Navigation -->
        <nav class="admin-nav">
            <a href="/admin">
                <svg class="icon"><use href="#icon-home"/></svg> 首页
            </a>
            <a href="/admin/users">
                <svg class="icon"><use href="#icon-users"/></svg> 用户管理
            </a>
            <a href="/admin/records" class="active">
                <svg class="icon"><use href="#icon-folder"/></svg> 数据记录
            </a>
            <a href="/admin/charts">
                <svg class="icon"><use href="#icon-chart"/></svg> 数据分析
            </a>
        </nav>

        <!-- Unified Statistics Card -->
        <div class="stats-unified">
            <div class="stats-unified-header">
                <svg class="icon icon-24"><use href="#icon-chart"/></svg>
                <h2>记录概览</h2>
            </div>
            <div class="stats-grid-unified">
                <div class="stat-item-unified">
                    <div class="stat-icon-unified">
                        <svg class="icon icon-32"><use href="#icon-database"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${totalRecords}">0</h3>
                        <p>总记录数</p>
                    </div>
                </div>
                <div class="stat-item-unified">
                    <div class="stat-icon-unified">
                        <svg class="icon icon-32"><use href="#icon-folder"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${currentPage + 1} + ' / ' + ${totalPages}">1 / 1</h3>
                        <p>当前页</p>
                    </div>
                </div>
                <div class="stat-item-unified">
                    <div class="stat-icon-unified">
                        <svg class="icon icon-32"><use href="#icon-compress"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${compressedCount}">0</h3>
                        <p>冷数据压缩数 <span th:if="${isCompressionRunning}" class="badge badge-success" style="font-size: 10px;">运行中</span></p>
                    </div>
                </div>
                <div class="stat-item-unified">
                    <div class="stat-icon-unified">
                        <svg class="icon icon-32"><use href="#icon-database"/></svg>
                    </div>
                    <div class="stat-content-unified">
                        <h3 th:text="${#numbers.formatDecimal(spaceSaved / 1024.0, 0, 2)} + ' KB'">0 KB</h3>
                        <p>节省空间</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Records Table with Integrated Filter -->
        <div class="admin-card">
            <div class="admin-card-header">
                <h2 class="admin-card-title">
                    <svg class="icon"><use href="#icon-folder"/></svg> 记录列表
                </h2>
                <span class="badge badge-primary" id="filteredCount" th:text="${totalRecords} + ' 条记录'">0 条记录</span>
            </div>
            
            <!-- Integrated Filter Section -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label>用户名</label>
                        <input type="text" id="filterUsername" placeholder="搜索用户名...">
                    </div>
                    
                    <div class="filter-item">
                        <label>开始日期</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    
                    <div class="filter-item">
                        <label>结束日期</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    
                    <div class="filter-item">
                        <label>大小范围 (KB)</label>
                        <div class="range-inputs">
                            <input type="number" id="filterMinSize" placeholder="最小" min="0">
                            <span>-</span>
                            <input type="number" id="filterMaxSize" placeholder="最大" min="0">
                        </div>
                    </div>
                    
                    <div class="filter-item">
                        <label>压缩率 (%)</label>
                        <div class="range-inputs">
                            <input type="number" id="filterMinRatio" placeholder="最小" min="0" max="100">
                            <span>-</span>
                            <input type="number" id="filterMaxRatio" placeholder="最大" min="0" max="100">
                        </div>
                    </div>
                </div>
                
                <div class="filter-actions">
                    <button class="btn btn-outline btn-sm" onclick="resetFilters()">
                        <svg class="icon"><use href="#icon-reset"/></svg> 重置
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="applyFilters()">
                        <svg class="icon"><use href="#icon-filter"/></svg> 筛选
                    </button>
                </div>
            </div>
            
            <div class="admin-table-container">
                <table class="admin-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th>记录ID</th>
                            <th>用户名</th>
                            <th class="sortable" data-column="dataCount" onclick="sortTable('dataCount')">数据点数</th>
                            <th class="sortable" data-column="interval" onclick="sortTable('interval')">采样间隔</th>
                            <th class="sortable" data-column="originalSize" onclick="sortTable('originalSize')">原始大小</th>
                            <th class="sortable" data-column="compressedSize" onclick="sortTable('compressedSize')">压缩后</th>
                            <th class="sortable" data-column="compressionRatio" onclick="sortTable('compressionRatio')">压缩率</th>
                            <th class="sortable" data-column="createdAt" onclick="sortTable('createdAt')">上传时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody" th:if="${!#lists.isEmpty(records)}">
                        <tr th:each="record : ${records}" class="record-row"
                            th:attr="data-username=${record.username},
                                     data-date=${record.createdAt},
                                     data-size=${record.originalSize},
                                     data-ratio=${record.compressionRatio},
                                     data-datacount=${record.dataCount},
                                     data-interval=${record.interval},
                                     data-compressedsize=${record.compressedSize}">
                            <td th:text="${record.recordId}">-</td>
                            <td>
                                <a th:href="@{/admin/users/{id}(id=${record.userId})}"
                                   style="color: var(--primary); text-decoration: none; font-weight: 500;"
                                   th:text="${record.username}">-</a>
                            </td>
                            <td th:text="${record.dataCount}">-</td>
                            <td th:text="${record.interval} + ' ms'">-</td>
                            <td th:text="${record.originalSize} + ' B'">-</td>
                            <td th:text="${record.compressedSize != null ? record.compressedSize + ' B' : '-'}">-</td>
                            <td th:text="${record.compressionRatio}">-</td>
                            <td th:text="${record.createdAt}">-</td>
                            <td>
                                <div class="flex gap-sm flex-wrap">
                                    <a th:href="@{/admin/records/{id}(id=${record.recordId})}" class="btn btn-primary btn-sm">详情</a>
                                    <button class="btn btn-danger btn-sm" th:attr="data-id=${record.recordId}" onclick="delRecord(this)">删除</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(records)}" class="empty-state">
                <svg class="icon icon-xl" style="opacity: 0.5;"><use href="#icon-folder"/></svg>
                <p>暂无数据记录</p>
            </div>

            <!-- Pagination -->
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:if="${currentPage > 0}" th:href="@{/admin/records(page=${currentPage - 1})}">« 上一页</a>
                
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:if="${i != currentPage}" th:href="@{/admin/records(page=${i})}" th:text="${i + 1}">1</a>
                    <span th:if="${i == currentPage}" class="active" th:text="${i + 1}">1</span>
                </th:block>
                
                <a th:if="${currentPage < totalPages - 1}" th:href="@{/admin/records(page=${currentPage + 1})}">下一页 »</a>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // Store all records for filtering and sorting
        var allRecords = [];
        var currentSort = { column: null, direction: 'asc' };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            var rows = document.querySelectorAll('.record-row');
            rows.forEach(function(row) {
                allRecords.push({
                    element: row,
                    username: row.getAttribute('data-username').toLowerCase(),
                    date: row.getAttribute('data-date'),
                    size: parseInt(row.getAttribute('data-size')) || 0,
                    ratio: parseFloat(row.getAttribute('data-ratio')) || 0,
                    dataCount: parseInt(row.getAttribute('data-datacount')) || 0,
                    interval: parseInt(row.getAttribute('data-interval')) || 0,
                    compressedSize: parseInt(row.getAttribute('data-compressedsize')) || 0
                });
            });
        });
        
        function applyFilters() {
            var usernameFilter = document.getElementById('filterUsername').value.toLowerCase();
            var startDate = document.getElementById('filterStartDate').value;
            var endDate = document.getElementById('filterEndDate').value;
            var minSize = parseFloat(document.getElementById('filterMinSize').value) || 0;
            var maxSize = parseFloat(document.getElementById('filterMaxSize').value) || Infinity;
            var minRatio = parseFloat(document.getElementById('filterMinRatio').value) || 0;
            var maxRatio = parseFloat(document.getElementById('filterMaxRatio').value) || 100;
            
            var visibleCount = 0;
            
            allRecords.forEach(function(record) {
                var show = true;
                
                // Username filter
                if (usernameFilter && !record.username.includes(usernameFilter)) {
                    show = false;
                }
                
                // Date filter
                if (startDate || endDate) {
                    var recordDate = record.date.split(' ')[0];
                    if (startDate && recordDate < startDate) show = false;
                    if (endDate && recordDate > endDate) show = false;
                }
                
                // Size filter (convert bytes to KB)
                var sizeKB = record.size / 1024;
                if (sizeKB < minSize || sizeKB > maxSize) {
                    show = false;
                }
                
                // Ratio filter
                if (record.ratio < minRatio || record.ratio > maxRatio) {
                    show = false;
                }
                
                record.element.style.display = show ? '' : 'none';
                record.visible = show;
                if (show) visibleCount++;
            });
            
            document.getElementById('filteredCount').textContent = visibleCount + ' 条记录';
            updateEmptyState(visibleCount);
        }
        
        function resetFilters() {
            document.getElementById('filterUsername').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            document.getElementById('filterMinSize').value = '';
            document.getElementById('filterMaxSize').value = '';
            document.getElementById('filterMinRatio').value = '';
            document.getElementById('filterMaxRatio').value = '';
            
            allRecords.forEach(function(record) {
                record.element.style.display = '';
                record.visible = true;
            });
            
            document.getElementById('filteredCount').textContent = allRecords.length + ' 条记录';
            updateEmptyState(allRecords.length);
            
            // Reset sort indicators
            document.querySelectorAll('.sortable').forEach(function(th) {
                th.classList.remove('sort-asc', 'sort-desc');
            });
            currentSort = { column: null, direction: 'asc' };
        }
        
        function updateEmptyState(count) {
            var tbody = document.getElementById('recordsTableBody');
            var emptyState = document.querySelector('.empty-state');
            var existingFilterEmpty = document.getElementById('filterEmptyState');
            
            if (existingFilterEmpty) {
                existingFilterEmpty.remove();
            }
            
            if (count === 0) {
                var filterEmpty = document.createElement('div');
                filterEmpty.id = 'filterEmptyState';
                filterEmpty.className = 'empty-state';
                filterEmpty.innerHTML = '<svg class="icon icon-xl" style="opacity: 0.5;"><use href="#icon-folder"/></svg><p>没有符合筛选条件的记录</p>';
                tbody.parentElement.parentElement.appendChild(filterEmpty);
                tbody.parentElement.style.display = 'none';
            } else {
                tbody.parentElement.style.display = 'block';
            }
        }
        
        function sortTable(column) {
            var tbody = document.getElementById('recordsTableBody');
            var rows = Array.from(tbody.querySelectorAll('.record-row'));
            
            // Toggle direction if same column
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }
            
            // Update sort indicators
            document.querySelectorAll('.sortable').forEach(function(th) {
                th.classList.remove('sort-asc', 'sort-desc');
            });
            var currentTh = document.querySelector('.sortable[data-column="' + column + '"]');
            if (currentTh) {
                currentTh.classList.add(currentSort.direction === 'asc' ? 'sort-asc' : 'sort-desc');
            }
            
            // Sort rows
            rows.sort(function(a, b) {
                var aVal, bVal;
                
                switch(column) {
                    case 'dataCount':
                        aVal = parseInt(a.getAttribute('data-datacount')) || 0;
                        bVal = parseInt(b.getAttribute('data-datacount')) || 0;
                        break;
                    case 'interval':
                        aVal = parseInt(a.getAttribute('data-interval')) || 0;
                        bVal = parseInt(b.getAttribute('data-interval')) || 0;
                        break;
                    case 'originalSize':
                        aVal = parseInt(a.getAttribute('data-size')) || 0;
                        bVal = parseInt(b.getAttribute('data-size')) || 0;
                        break;
                    case 'compressedSize':
                        aVal = parseInt(a.getAttribute('data-compressedsize')) || 0;
                        bVal = parseInt(b.getAttribute('data-compressedsize')) || 0;
                        break;
                    case 'compressionRatio':
                        aVal = parseFloat(a.getAttribute('data-ratio')) || 0;
                        bVal = parseFloat(b.getAttribute('data-ratio')) || 0;
                        break;
                    case 'createdAt':
                        aVal = new Date(a.getAttribute('data-date')).getTime();
                        bVal = new Date(b.getAttribute('data-date')).getTime();
                        break;
                    default:
                        return 0;
                }
                
                if (currentSort.direction === 'asc') {
                    return aVal - bVal;
                } else {
                    return bVal - aVal;
                }
            });
            
            // Re-append sorted rows
            rows.forEach(function(row) {
                tbody.appendChild(row);
            });
        }

        function delRecord(btn) {
            const recordId = btn.getAttribute('data-id');
            if (!confirm('确定要删除这条数据记录吗？')) return;
            
            fetch('/admin/api/records/' + recordId + '/delete', {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                if (data.success) location.reload();
            });
        }

        // Navigation sliding indicator with sessionStorage
        function updateNavIndicator() {
            const nav = document.querySelector('.admin-nav');
            const activeLink = nav.querySelector('a.active');
            if (activeLink) {
                const navRect = nav.getBoundingClientRect();
                const linkRect = activeLink.getBoundingClientRect();
                const left = linkRect.left - navRect.left;
                const width = linkRect.width;
                
                // Check if we have a previous position stored
                const prevLeft = sessionStorage.getItem('navIndicatorLeft');
                const prevWidth = sessionStorage.getItem('navIndicatorWidth');
                
                if (prevLeft !== null && prevWidth !== null) {
                    // Set initial position without animation
                    nav.classList.add('initializing');
                    nav.style.setProperty('--indicator-left', prevLeft + 'px');
                    nav.style.setProperty('--indicator-width', prevWidth + 'px');
                    
                    // Force reflow
                    nav.offsetHeight;
                    
                    // Remove initializing class and animate to new position
                    nav.classList.remove('initializing');
                }
                
                // Animate to current position
                nav.style.setProperty('--indicator-left', left + 'px');
                nav.style.setProperty('--indicator-width', width + 'px');
                
                // Store current position for next page
                sessionStorage.setItem('navIndicatorLeft', left);
                sessionStorage.setItem('navIndicatorWidth', width);
            }
        }

        // Update on load and resize
        window.addEventListener('load', updateNavIndicator);
        window.addEventListener('resize', function() {
            const nav = document.querySelector('.admin-nav');
            nav.classList.add('initializing');
            updateNavIndicator();
            nav.classList.remove('initializing');
        });
    </script>
</body>
</html>
